<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bi-Weekly Budget App</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system; background:#eef7ee; }

.header {
  background: linear-gradient(135deg,#16a34a,#22c55e);
  color:white; padding:25px; border-radius:0 0 25px 25px; text-align:center;
}

.container { padding:15px; margin-top:-20px; }

.card {
  background:white; border-radius:18px; padding:16px; margin-bottom:15px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.stat { display:flex; align-items:center; gap:10px; }

#budget { width:90px; text-align:right; padding:6px; }
#updateBudgetBtn { width:auto; padding:6px 10px; font-size:12px; }

input, select {
  width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;
}

button {
  border:none; border-radius:10px; padding:6px 10px; margin-left:5px; cursor:pointer;
  background:#16a34a; color:white; font-weight:bold;
}

.row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; align-items:center; }
.row div.actions { display:flex; gap:5px; }

.subtle { font-size:12px; color:gray; }

/* Progress bar */
.progress { height:12px; background:#e5e5ea; border-radius:10px; overflow:hidden; margin-top:10px; }
.bar { height:100%; width:0%; background:#34c759; transition:0.3s; }
.bar.yellow { background:#ffcc00; }
.bar.red { background:#ff3b30; }

/* Transaction row formatting */
.transaction-desc { font-weight:bold; }
.transaction-amt { color:#16a34a; margin-left:10px; font-weight:bold; }
</style>
</head>
<body>

<div class="header"><h2>Bi-Weekly Budget</h2></div>
<div class="container">

<!-- Budget Card -->
<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>
  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="cycle" class="subtle"></div>
  <div id="insights" class="subtle"></div>
</div>

<!-- Pie Chart -->
<div class="card"><canvas id="chart"></canvas></div>

<!-- Add Transaction -->
<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">
  <select id="category">
    <option value="">AI Auto</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Kids</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Other</option>
  </select>
  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<!-- Transaction List -->
<div class="card" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔒 Locked Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain: "biweekly-budget-a5dac.firebaseapp.com",
  projectId: "biweekly-budget-a5dac",
  storageBucket: "biweekly-budget-a5dac.firebasestorage.app",
  messagingSenderId: "832349348274",
  appId: "1:832349348274:web:293ca1023fb060b20b04ab",
  measurementId: "G-4KDSBKEQ51"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let transactions = [];
let chart;

// DOM refs
const spentEl = document.getElementById("spent");
const remainingEl = document.getElementById("remaining");
const budgetInput = document.getElementById("budget");
const desc = document.getElementById("desc");
const amount = document.getElementById("amount");
const category = document.getElementById("category");
const list = document.getElementById("list");
const cycleEl = document.getElementById("cycle");
const insightsEl = document.getElementById("insights");
const chartEl = document.getElementById("chart");
const addBtn = document.getElementById("addBtn");
const exportBtn = document.getElementById("exportBtn");
const updateBudgetBtn = document.getElementById("updateBudgetBtn");

const budgetDoc = doc(db,"settings","currentBudget");
const cycleDoc = doc(db,"settings","cycle");
let cycleAnchor = null;

// 🟢 AI-style categorization
function categorizeAI(desc){
  const d = desc.toLowerCase();
  if(/food|restaurant|coffee|pizza|chipotle|starbucks/.test(d)) return "Food";
  if(/gas|uber|flight|taxi/.test(d)) return "Travel";
  if(/amazon|target|walmart/.test(d)) return "Shopping";
  if(/kid|school|toy|diaper/.test(d)) return "Kids";
  if(/rent|bill|electric|water|internet/.test(d)) return "Bills";
  if(/movie|netflix|concert|game/.test(d)) return "Entertainment";
  return "Other";
}

// Load budget
onSnapshot(budgetDoc, s=>{
  if(s.exists()) budgetInput.value = "$"+s.data().amount.toLocaleString();
  else setDoc(budgetDoc,{amount:1200});
});

// Load cycle anchor
onSnapshot(cycleDoc,s=>{
  if(s.exists()) cycleAnchor = new Date(s.data().start);
  else setDoc(cycleDoc,{start:new Date(2026,2,19).toISOString()});
});

// Load & migrate transactions
async function loadTransactions(){
  const snap = await getDocs(collection(db,"transactions"));
  let needsMigration=false;
  transactions = snap.docs.map(d=>{
    const data=d.data();
    if(!data.date || !data.category) needsMigration=true;
    return {id:d.id, ...data};
  });

  if(needsMigration){
    for(const t of transactions){
      const updates={};
      if(!t.date) updates.date=new Date().toISOString();
      if(!t.category) updates.category=categorizeAI(t.desc||"");
      if(Object.keys(updates).length) await updateDoc(doc(db,"transactions",t.id),updates);
    }
    console.log("✅ Migration complete");
  }
  startRealtime();
}

// Realtime listener
function startRealtime(){
  const q = query(collection(db,"transactions"), orderBy("date","asc"));
  onSnapshot(q,snap=>{
    transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// Render
function render(){
  if(!cycleAnchor) return;

  const now=new Date(); now.setHours(0,0,0,0);
  const diffDays=Math.floor((now-cycleAnchor)/86400000);
  const cycleIndex=Math.floor(diffDays/14);
  const cycleStart=new Date(cycleAnchor); cycleStart.setDate(cycleAnchor.getDate()+cycleIndex*14);
  const cycleEnd=new Date(cycleStart); cycleEnd.setDate(cycleStart.getDate()+13);
  cycleEl.innerText=`Cycle: ${cycleStart.toLocaleDateString()} - ${cycleEnd.toLocaleDateString()}`;

  const budgetVal = parseFloat(budgetInput.value.replace(/[^0-9.-]+/g,""))||1200;
  const filtered = transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=cycleStart && d<=cycleEnd;
  });

  const spent = filtered.reduce((a,b)=>a+b.amt,0);
  spentEl.innerText="$"+spent.toLocaleString();
  remainingEl.innerText="$"+(budgetVal-spent).toLocaleString();

  // Progress bar
  const timePct = Math.min(((now-cycleStart)/86400000)/14*100,100);
  const spendPct = Math.min(spent/budgetVal*100,100);
  const bar = document.getElementById("bar");
  bar.style.width=spendPct+"%";
  bar.className="bar";
  if(spendPct>timePct+15) bar.classList.add("red");
  else if(spendPct>timePct+5) bar.classList.add("yellow");

  // Pie chart
  const totals={};
  filtered.forEach(t=>totals[t.category]=(totals[t.category]||0)+t.amt);
  if(chart) chart.destroy();
  chart=new Chart(chartEl,{type:"pie",data:{labels:Object.keys(totals),datasets:[{data:Object.values(totals)}]}});

  const topCat=Object.entries(totals).sort((a,b)=>b[1]-a[1])[0];
  insightsEl.innerText=topCat ? `Top spending: ${topCat[0]} (${Math.round(topCat[1]/spent*100)}%)` : "";

  // Transaction list
  list.innerHTML="";
  filtered.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>
        <span class="transaction-desc">${t.desc}</span>
        <span class="transaction-amt">$${t.amt.toLocaleString()}</span>
        <div class="subtle">${t.category}</div>
      </div>
      <div class="actions">
        <button onclick="editTransaction('${t.id}','${t.desc}',${t.amt},'${t.category}')">Edit</button>
        <button onclick="deleteTransaction('${t.id}')">Delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

// Add transaction
async function addTransaction(){
  const descVal=desc.value.trim();
  const amtVal=parseFloat(amount.value);
  if(!descVal || !amtVal) return;

  const catVal=category.value || categorizeAI(descVal);
  await addDoc(collection(db,"transactions"),{desc:descVal, amt:amtVal, category:catVal, date:new Date().toISOString()});
  desc.value=""; amount.value=""; category.value="";
}

// Edit transaction with dropdown
window.editTransaction = async(id,oldDesc,oldAmt,oldCat)=>{
  const modalDesc = prompt("Edit description:", oldDesc);
  if(modalDesc===null) return;
  const modalAmt = parseFloat(prompt("Edit amount:", oldAmt));
  if(isNaN(modalAmt)) return;

  // Dropdown for category
  const categories=["Food","Travel","Shopping","Kids","Bills","Entertainment","Other"];
  const newCat = prompt("Edit category (Food,Travel,Shopping,Kids,Bills,Entertainment,Other):", oldCat) || categorizeAI(modalDesc);
  if(!categories.includes(newCat)) categories.push(newCat);

  await updateDoc(doc(db,"transactions",id),{desc:modalDesc, amt:modalAmt, category:newCat});
};

// Delete
window.deleteTransaction = async id => await deleteDoc(doc(db,"transactions",id));

// Export Excel
async function exportToExcel(){
  const snap=await getDocs(collection(db,"transactions"));
  const data = snap.docs.map(d=>{
    const t=d.data();
    return {Description:t.desc, Amount:t.amt, Category:t.category, Date:t.date};
  });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

// Update budget
updateBudgetBtn.onclick=async ()=>{
  const val=parseFloat(budgetInput.value.replace(/[^0-9.-]+/g,""));
  if(!isNaN(val)) await setDoc(budgetDoc,{amount:val});
  render();
};

// Event listeners
addBtn.onclick=addTransaction;
exportBtn.onclick=exportToExcel;

// Initialize
loadTransactions();

</script>
</body>
</html>
