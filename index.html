<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system;
  background: #eef2f7;
}

.header {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
  padding: 25px;
  border-radius: 0 0 25px 25px;
}

.container { padding: 15px; margin-top: -20px; }

.card {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.stat {
  display: flex;
  align-items: center;
  gap: 10px;
}

#budget { width: 100px; text-align: right; padding: 6px; }

#updateBudgetBtn {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: white;
  font-weight: bold;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.subtle { color: gray; font-size: 12px; }
</style>
</head>

<body>

<div class="header"><h2>Bi-Weekly Budget</h2></div>

<div class="container">

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>

  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>
  <div id="insights" class="subtle"></div>
</div>

<!-- PIE CHART -->
<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <!-- CATEGORY DROPDOWN -->
  <select id="category">
    <option value="">Auto</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Kids</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Other</option>
  </select>

  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIza...", projectId:"biweekly-budget-a5dac" });
const db = getFirestore(app);

let transactions = [];
let budgetValue = 1200;
let cycleAnchor = null;
let chart;

/* CATEGORY */
function categorize(desc){
  const d = desc.toLowerCase();
  if(/food|restaurant|coffee|pizza|chipotle/.test(d)) return "Food";
  if(/gas|uber|flight/.test(d)) return "Travel";
  if(/amazon|target|shop/.test(d)) return "Shopping";
  if(/kid|school/.test(d)) return "Kids";
  if(/rent|bill|electric/.test(d)) return "Bills";
  if(/movie|netflix/.test(d)) return "Entertainment";
  return "Other";
}

/* SETTINGS */
const budgetDoc = doc(db,"settings","currentBudget");
const cycleDoc = doc(db,"settings","cycle");

onSnapshot(budgetDoc,s=>{
  if(s.exists()){
    budgetValue=s.data().amount;
    budget.value="$"+budgetValue;
    render();
  } else setDoc(budgetDoc,{amount:1200});
});

onSnapshot(cycleDoc,s=>{
  if(s.exists()){
    cycleAnchor=new Date(s.data().start);
    cycleAnchor.setHours(0,0,0,0);
    render();
  } else setDoc(cycleDoc,{start:new Date(2026,2,19).toISOString()});
});

/* CYCLE */
function getStart(){
  const d=new Date(); d.setHours(0,0,0,0);
  const diff=Math.floor((d-cycleAnchor)/86400000);
  const idx=Math.floor(diff/14);
  const s=new Date(cycleAnchor);
  s.setDate(cycleAnchor.getDate()+idx*14);
  return s;
}
function getEnd(s){ const e=new Date(s); e.setDate(s.getDate()+13); return e; }

/* ADD */
async function addTransaction(){
  const descVal=desc.value.trim();
  const amt=parseFloat(amount.value);
  if(!descVal||!amt) return;

  let cat = category.value;
  if(!cat) cat = categorize(descVal);

  await addDoc(collection(db,"transactions"),{
    desc:descVal,
    amt,
    category:cat,
    date:new Date().toISOString()
  });

  desc.value=""; amount.value=""; category.value="";
}

/* EDIT */
async function editTransaction(id,descVal,amtVal,catVal){
  const nd=prompt("Edit desc:",descVal);
  const na=parseFloat(prompt("Edit amount:",amtVal));
  const nc=prompt("Edit category:",catVal);
  if(!nd||!na) return;

  await updateDoc(doc(db,"transactions",id),{
    desc:nd, amt:na, category:nc||categorize(nd)
  });
}

/* RENDER */
function render(){
  if(!cycleAnchor) return;

  const start=getStart();
  const end=getEnd(start);

  const filtered=transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent=filtered.reduce((a,b)=>a+b.amt,0);
  spentEl.innerText="$"+spent;
  remaining.innerText="$"+(budgetValue-spent);

  cycle.innerText=`${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  /* CATEGORY TOTALS */
  const totals={};
  filtered.forEach(t=>{
    totals[t.category]=(totals[t.category]||0)+t.amt;
  });

  /* INSIGHTS */
  let topCat="";
  let max=0;
  Object.entries(totals).forEach(([k,v])=>{
    if(v>max){max=v; topCat=k;}
  });

  if(topCat){
    const pct=((max/spent)*100).toFixed(0);
    insights.innerText=`Top spending: ${topCat} (${pct}%)`;
  }

  /* CHART */
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: Object.keys(totals),
      datasets: [{ data: Object.values(totals) }]
    }
  });

  /* LIST */
  list.innerHTML="";
  filtered.reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>
        <strong>${t.desc}</strong>
        <div class="subtle">${t.category}</div>
      </div>
      <div>
        $${t.amt}
        <button onclick="editTransaction('${t.id}','${t.desc}',${t.amt}','${t.category}')">Edit</button>
        <button onclick="deleteTransaction('${t.id}')">X</button>
      </div>
    `;
    list.appendChild(row);
  });
}

/* EXPORT */
async function exportToExcel(){
  const docs=await getDocs(collection(db,"transactions"));
  const data=docs.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

/* LISTENER */
const q=query(collection(db,"transactions"),orderBy("date","asc"));
onSnapshot(q,s=>{
  transactions=s.docs.map(d=>{
    const data=d.data();
    if(!data.category) data.category=categorize(data.desc);
    return {id:d.id,...data};
  });
  render();
});

/* EVENTS */
addBtn.onclick=addTransaction;
exportBtn.onclick=exportToExcel;
updateBudgetBtn.onclick=async()=>{
  const val=parseFloat(budget.value.replace(/[^0-9]/g,""));
  await setDoc(budgetDoc,{amount:val});
};

window.editTransaction=editTransaction;
window.deleteTransaction=async(id)=>deleteDoc(doc(db,"transactions",id));

</script>
</body>
</html>
