<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bi-Weekly Budget</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; } /* FIXES OVERFLOW */

body { font-family: -apple-system; margin: 0; background: #f2f2f7; }
.container { padding: 20px; }

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

h1 { text-align: center; }

/* Budget row */
.stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Smaller budget input */
#budget {
  width: 110px;
  text-align: right;
  padding: 8px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  font-size: 16px;
}

/* Buttons */
button {
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 16px;
}

#addBtn, #updateBudgetBtn, #exportBtn {
  width: 100%;
  background: #16a34a;
  color: white;
  margin-top: 5px;
}

/* Progress */
.progress {
  height: 10px;
  background: #e5e5ea;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  background: #16a34a;
}

.red { background: #dc2626 !important; }
.yellow { background: #facc15 !important; }

.subtle { font-size: 13px; color: gray; }

/* Transactions */
.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>
<div class="container">

<h1>Bi-Weekly Budget</h1>

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <input id="budget" value="$1,200">
  </div>

  <button id="updateBudgetBtn">Update Budget</button>

  <div class="stat"><span>Spent</span><span id="spent">$0</span></div>
  <div class="stat"><span>Remaining</span><span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>
  <div id="pace" class="subtle"></div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
</div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">
  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "biweekly-budget-a5dac.firebaseapp.com",
  projectId: "biweekly-budget-a5dac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let transactions = [];
let budgetValue = 1200;
let lastCycleStart = null;

/* --- FIXED CYCLE (MIDNIGHT NORMALIZED) --- */
const anchor = new Date(2026, 2, 19); // March = 2 (0-based)
anchor.setHours(0,0,0,0);

function getCycleStart(date = new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);

  const diffDays = Math.floor((d - anchor) / (1000*60*60*24));
  const cycleIndex = Math.floor(diffDays / 14);

  const start = new Date(anchor);
  start.setDate(anchor.getDate() + (cycleIndex * 14));
  return start;
}

function getCycleEnd(start) {
  const end = new Date(start);
  end.setDate(start.getDate() + 13);
  return end;
}

/* --- Utils --- */
function formatCurrency(n){ return "$" + n.toLocaleString(); }
function parseCurrency(s){ return parseFloat(s.replace(/[^0-9.-]/g,""))||0; }

/* --- Budget Sync --- */
const budgetDoc = doc(db,"settings","currentBudget");

onSnapshot(budgetDoc, snap=>{
  if(snap.exists()){
    budgetValue = snap.data().amount;
    document.getElementById("budget").value = formatCurrency(budgetValue);
    render();
  } else {
    setDoc(budgetDoc,{amount:budgetValue});
  }
});

async function updateBudget(){
  const val = parseCurrency(document.getElementById("budget").value);
  await setDoc(budgetDoc,{amount:val});
}

/* --- Transactions --- */
async function addTransaction(){
  const desc = document.getElementById("desc").value.trim();
  const amt = parseFloat(document.getElementById("amount").value);
  if(!desc || !amt) return;

  await addDoc(collection(db,"transactions"),{
    desc, amt, date: new Date().toISOString()
  });

  document.getElementById("desc").value="";
  document.getElementById("amount").value="";
}

async function deleteTransaction(id){
  await deleteDoc(doc(db,"transactions",id));
}

async function editTransaction(id,desc,amt){
  const nd = prompt("Edit description:",desc);
  const na = parseFloat(prompt("Edit amount:",amt));
  if(!nd || !na) return;

  await updateDoc(doc(db,"transactions",id),{desc:nd, amt:na});
}

/* --- Render --- */
async function render(){
  const start = getCycleStart();
  const end = getCycleEnd(start);
  const now = new Date();

  if(!lastCycleStart) lastCycleStart = start;

  if(start > lastCycleStart){
    await archive(lastCycleStart,start);
    for(let t of transactions){
      await deleteDoc(doc(db,"transactions",t.id));
    }
    transactions=[];
    lastCycleStart=start;
  }

  const filtered = transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent = filtered.reduce((a,b)=>a+b.amt,0);
  const remaining = budgetValue - spent;

  document.getElementById("spent").innerText = formatCurrency(spent);
  document.getElementById("remaining").innerText = formatCurrency(remaining);

  const days = Math.min(Math.floor((now-start)/(1000*60*60*24))+1,14);
  const timePct = (days/14)*100;
  const spendPct = (spent/budgetValue)*100;

  document.getElementById("pace").innerText =
    `Used ${timePct.toFixed(0)}% of time, ${spendPct.toFixed(0)}% of budget`;

  const bar = document.getElementById("bar");
  bar.style.width = spendPct + "%";
  bar.className="bar";
  if(spendPct-timePct>15) bar.classList.add("red");
  else if(spendPct-timePct>5) bar.classList.add("yellow");

  document.getElementById("cycle").innerText =
    `Cycle: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  const list = document.getElementById("list");
  list.innerHTML="";

  filtered.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <span>${t.desc} - ${formatCurrency(t.amt)}</span>
      <span>
        <button onclick="editTransaction('${t.id}','${t.desc}',${t.amt})">Edit</button>
        <button onclick="deleteTransaction('${t.id}')">Delete</button>
      </span>
    `;
    list.appendChild(row);
  });
}

/* --- Archive --- */
async function archive(start,next){
  const old = transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<next;
  });
  for(let t of old){
    await addDoc(collection(db,"history"),t);
  }
}

/* --- Export --- */
async function exportToExcel(){
  const docs = await getDocs(collection(db,"transactions"));
  const data = docs.docs.map(d=>d.data());
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

/* --- Listener --- */
const q = query(collection(db,"transactions"),orderBy("date","asc"));
onSnapshot(q,snap=>{
  transactions = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

/* --- Events --- */
window.editTransaction = editTransaction;
window.deleteTransaction = deleteTransaction;

document.getElementById("addBtn").onclick = addTransaction;
document.getElementById("updateBudgetBtn").onclick = updateBudget;
document.getElementById("exportBtn").onclick = exportToExcel;

</script>
</body>
</html>
