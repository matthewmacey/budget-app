<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget App v2</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#eef7ee}
.header{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;padding:20px;text-align:center}
.container{padding:15px}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:8px}
button{background:#16a34a;color:#fff;border:none;padding:8px;border-radius:8px;margin-right:5px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.subtle{font-size:12px;color:gray}
.bar{height:10px;background:#34c759;border-radius:8px;width:0%}
.bar.yellow{background:#ffcc00}
.bar.red{background:#ff3b30}
</style>
</head>

<body>

<div class="header"><h2>Budget v2</h2></div>

<div class="container">

<div class="card">
  Budget <input id="budget">
  <button id="saveBudget">Save Budget</button>

  <div>Spent: <span id="spent">$0</span></div>
  <div>Remaining: <span id="remaining">$0</span></div>

  <div class="bar" id="bar"></div>

  <div id="pace" class="subtle"></div>
  <div id="forecast" class="subtle"></div>
  <div id="insight" class="subtle"></div>
</div>

<div class="card"><canvas id="chart"></canvas></div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <select id="category">
    <option value="">AI Auto</option>
    <option>Food</option><option>Travel</option><option>Shopping</option>
    <option>Kids</option><option>Bills</option><option>Entertainment</option>
    <option>Alcohol</option><option>Other</option>
  </select>

  <button id="addBtn">Add</button>
  <button id="exportBtn">Export</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, setDoc, doc,
  onSnapshot, deleteDoc, updateDoc, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain:"biweekly-budget-a5dac.firebaseapp.com",
  projectId:"biweekly-budget-a5dac"
});
const db = getFirestore(app);

let transactions=[];
let chart;

// ---------- AI ----------
function catAI(d){
  d=d.toLowerCase();
  if(/restaurant|coffee|pizza/.test(d)) return "Food";
  if(/uber|gas/.test(d)) return "Travel";
  if(/amazon|target/.test(d)) return "Shopping";
  if(/beer|wine|vodka/.test(d)) return "Alcohol";
  if(/netflix|movie/.test(d)) return "Entertainment";
  return "Other";
}

// ---------- LOCAL BACKUP ----------
function backup(data){
  localStorage.setItem("budget_backup",JSON.stringify(data));
}
function loadBackup(){
  return JSON.parse(localStorage.getItem("budget_backup")||"[]");
}

// ---------- LOAD DATA ----------
onSnapshot(collection(db,"transactions"),snap=>{
  transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
  backup(transactions);
  render();
},()=>{
  transactions=loadBackup();
  render();
});

// ---------- BUDGET ----------
const budgetDoc=doc(db,"settings","budget");

onSnapshot(budgetDoc,s=>{
  if(s.exists()){
    budget.value="$"+s.data().amount;
  }else{
    setDoc(budgetDoc,{amount:1200});
  }
});

saveBudget.onclick=async()=>{
  const val=parseFloat(budget.value.replace(/[^0-9.]/g,""));
  if(!val) return alert("Enter valid budget");
  await setDoc(budgetDoc,{amount:val});
};

// ---------- ADD ----------
addBtn.onclick=async()=>{
  const d=desc.value;
  const a=parseFloat(amount.value);
  if(!d || !a) return;

  const c=category.value||catAI(d);

  await addDoc(collection(db,"transactions"),{
    desc:d,amt:a,category:c,date:new Date().toISOString()
  });

  desc.value=""; amount.value="";
};

// ---------- DELETE ----------
window.del=id=>deleteDoc(doc(db,"transactions",id));

// ---------- RENDER ----------
function render(){

  const spentEl=document.getElementById("spent");

  const budgetVal=parseFloat(budget.value.replace(/[^0-9.]/g,""))||0;
  const spent=transactions.reduce((a,b)=>a+b.amt,0);

  spentEl.innerText="$"+spent.toFixed(0);
  remaining.innerText="$"+(budgetVal-spent).toFixed(0);

  const pct=(spent/budgetVal)*100 || 0;

  bar.style.width=Math.min(pct,100)+"%";
  bar.className="bar";
  if(pct>90) bar.classList.add("red");
  else if(pct>70) bar.classList.add("yellow");

  // Forecast
  const avgDaily=spent/Math.max(transactions.length,1);
  const forecastVal=avgDaily*14;
  forecast.innerText="Forecast: $"+forecastVal.toFixed(0);

  // AI Insights
  let insight="";

  if(pct>100) insight="⚠️ Over budget";
  else if(pct>80) insight="⚠️ Approaching limit";
  else insight="👍 On track";

  const totals={};
  transactions.forEach(t=>{
    const c=t.category||catAI(t.desc);
    totals[c]=(totals[c]||0)+t.amt;
  });

  const top=Object.entries(totals).sort((a,b)=>b[1]-a[1])[0];
  if(top) insight+=" • Top: "+top[0];

  if(totals["Alcohol"]>200) insight+=" • 🍺 High alcohol spend";

  document.getElementById("insight").innerText=insight;

  // Chart
  if(chart) chart.destroy();
  if(Object.keys(totals).length){
    chart=new Chart(document.getElementById("chart"),{
      type:"pie",
      data:{
        labels:Object.keys(totals),
        datasets:[{data:Object.values(totals)}]
      }
    });
  }

  // List
  list.innerHTML="";
  transactions.slice().reverse().forEach(t=>{
    const cat=t.category||catAI(t.desc);

    list.innerHTML+=`
      <div class="row">
        <div>
          ${t.desc} - $${t.amt}
          <div class="subtle">${cat}</div>
        </div>
        <button onclick="del('${t.id}')">X</button>
      </div>
    `;
  });
}

// ---------- EXPORT ----------
exportBtn.onclick=async()=>{
  const snap=await getDocs(collection(db,"transactions"));
  const data=snap.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
};

</script>
</body>
</html>
