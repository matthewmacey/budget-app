<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget App</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#eef7ee}
.header{background:#16a34a;color:#fff;padding:20px;text-align:center}
.container{padding:15px}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:8px}
button{background:#16a34a;color:#fff;border:none;padding:8px;border-radius:8px;margin-right:5px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.subtle{font-size:12px;color:gray}

#modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.4);justify-content:center;align-items:center;
}
.modal-box{
background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px
}
</style>
</head>

<body>

<div class="header"><h2>Budget App</h2></div>

<div class="container">

<div class="card">
  Budget <input id="budget">
  <button id="saveBudget">Save Budget</button>

  <div>Spent: <span id="spent">$0</span></div>
  <div>Remaining: <span id="remaining">$0</span></div>

  <div id="insight" class="subtle"></div>
</div>

<div class="card"><canvas id="chart"></canvas></div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <select id="category">
    <option value="">AI Auto</option>
    <option>Food</option><option>Travel</option><option>Shopping</option>
    <option>Kids</option><option>Bills</option><option>Entertainment</option>
    <option>Alcohol</option><option>Other</option>
  </select>

  <button id="addBtn">Add</button>
</div>

<div class="card" id="list"></div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3>Edit</h3>
    <input id="editDesc">
    <input id="editAmt" type="number">
    <select id="editCat">
      <option>Food</option><option>Travel</option><option>Shopping</option>
      <option>Kids</option><option>Bills</option><option>Entertainment</option>
      <option>Alcohol</option><option>Other</option>
    </select>
    <button id="saveEditBtn">Save</button>
    <button id="closeModalBtn">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc,
  onSnapshot, deleteDoc, updateDoc, setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ---------- INIT ----------
const app = initializeApp({
  apiKey:"AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain:"biweekly-budget-a5dac.firebaseapp.com",
  projectId:"biweekly-budget-a5dac"
});
const db = getFirestore(app);

// ---------- DOM ----------
const budgetInput = document.getElementById("budget");
const saveBudgetBtn = document.getElementById("saveBudget");
const spentEl = document.getElementById("spent");
const remainingEl = document.getElementById("remaining");
const insightEl = document.getElementById("insight");

const descInput = document.getElementById("desc");
const amountInput = document.getElementById("amount");
const categoryInput = document.getElementById("category");
const addBtn = document.getElementById("addBtn");
const listEl = document.getElementById("list");

const modal = document.getElementById("modal");
const editDesc = document.getElementById("editDesc");
const editAmt = document.getElementById("editAmt");
const editCat = document.getElementById("editCat");
const saveEditBtn = document.getElementById("saveEditBtn");
const closeModalBtn = document.getElementById("closeModalBtn");

let transactions = [];
let editId = null;
let chart;

// ---------- AI ----------
function catAI(d){
  d = (d || "").toLowerCase();
  if(/restaurant|coffee|pizza/.test(d)) return "Food";
  if(/uber|gas/.test(d)) return "Travel";
  if(/amazon|target/.test(d)) return "Shopping";
  if(/beer|wine|vodka/.test(d)) return "Alcohol";
  return "Other";
}

// ---------- LOAD ----------
onSnapshot(collection(db,"transactions"),snap=>{
  transactions = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

// ---------- BUDGET ----------
const budgetDoc = doc(db,"settings","budget");

onSnapshot(budgetDoc,s=>{
  if(s.exists()){
    if(document.activeElement !== budgetInput){
      budgetInput.value = "$" + s.data().amount;
    }
  } else {
    setDoc(budgetDoc,{amount:1200});
  }
});

saveBudgetBtn.onclick = async ()=>{
  const val = parseFloat(budgetInput.value.replace(/[^0-9.]/g,""));
  if(!val) return alert("Enter valid number");
  await setDoc(budgetDoc,{amount:val});
};

// ---------- ADD ----------
addBtn.onclick = async ()=>{
  const d = descInput.value;
  const a = parseFloat(amountInput.value);
  if(!d || !a) return;

  const c = categoryInput.value || catAI(d);

  await addDoc(collection(db,"transactions"),{
    desc:d, amt:a, category:c, date:new Date().toISOString()
  });

  descInput.value = "";
  amountInput.value = "";
};

// ---------- EDIT ----------
function openEdit(id){
  const t = transactions.find(x=>x.id===id);
  if(!t) return;

  editId = id;
  editDesc.value = t.desc;
  editAmt.value = t.amt;
  editCat.value = t.category || catAI(t.desc);

  modal.style.display = "flex";
}

saveEditBtn.onclick = async ()=>{
  if(!editId) return;

  await updateDoc(doc(db,"transactions",editId),{
    desc:editDesc.value,
    amt:parseFloat(editAmt.value),
    category:editCat.value
  });

  modal.style.display = "none";
};

closeModalBtn.onclick = ()=> modal.style.display = "none";

// ---------- DELETE ----------
function del(id){
  deleteDoc(doc(db,"transactions",id));
}

// ---------- RENDER ----------
function render(){

  const spent = transactions.reduce((a,b)=>a+(b.amt||0),0);
  const budgetVal = parseFloat(budgetInput.value.replace(/[^0-9.]/g,"")) || 0;

  spentEl.innerText = "$" + spent.toFixed(0);
  remainingEl.innerText = "$" + (budgetVal - spent).toFixed(0);

  // Insights
  let text = "";
  if(spent > budgetVal) text = "⚠️ Over budget";
  else text = "👍 On track";

  insightEl.innerText = text;

  // Chart
  const totals = {};
  transactions.forEach(t=>{
    const c = t.category || catAI(t.desc);
    totals[c] = (totals[c] || 0) + t.amt;
  });

  if(chart) chart.destroy();

  if(Object.keys(totals).length){
    chart = new Chart(document.getElementById("chart"),{
      type:"pie",
      data:{
        labels:Object.keys(totals),
        datasets:[{data:Object.values(totals)}]
      }
    });
  }

  // List
  listEl.innerHTML = "";
  transactions.slice().reverse().forEach(t=>{
    const cat = t.category || catAI(t.desc);

    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `
      <div>
        ${t.desc} - $${t.amt}
        <div class="subtle">${cat}</div>
      </div>
      <div>
        <button data-id="${t.id}" class="editBtn">Edit</button>
        <button data-id="${t.id}" class="delBtn">X</button>
      </div>
    `;
    listEl.appendChild(div);
  });

  // Attach events AFTER render
  document.querySelectorAll(".editBtn").forEach(btn=>{
    btn.onclick = ()=> openEdit(btn.dataset.id);
  });

  document.querySelectorAll(".delBtn").forEach(btn=>{
    btn.onclick = ()=> del(btn.dataset.id);
  });
}
</script>
</body>
</html>
