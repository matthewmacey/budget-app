<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Budget</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #eef2f7;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
  padding: 30px 20px 20px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

/* CONTAINER */
.container {
  padding: 15px;
  margin-top: -20px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

/* BUDGET ROW */
.stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#budget {
  width: 110px;
  text-align: right;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  font-size: 16px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: white;
  font-size: 16px;
  font-weight: 600;
  margin-top: 5px;
}

/* STATS */
.stat-line {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.subtle {
  font-size: 13px;
  color: #666;
}

/* PROGRESS */
.progress {
  height: 10px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  background: #16a34a;
}

.red { background: #dc2626 !important; }
.yellow { background: #facc15 !important; }

/* TRANSACTIONS */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.row strong {
  display: block;
}

.actions button {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Bi-Weekly Budget</h1>
</div>

<div class="container">

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <input id="budget">
  </div>
  <button id="updateBudgetBtn">Update Budget</button>

  <div class="stat-line"><span>Spent</span><span id="spent">$0</span></div>
  <div class="stat-line"><span>Remaining</span><span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>
  <div id="pace" class="subtle"></div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
</div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">
  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "biweekly-budget-a5dac.firebaseapp.com",
  projectId: "biweekly-budget-a5dac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let transactions = [];
let budgetValue = 1200;
let cycleAnchor = null;

/* --- UTIL --- */
function formatCurrency(n){ return "$" + n.toLocaleString(); }
function parseCurrency(s){ return parseFloat(s.replace(/[^0-9.-]/g,""))||0; }

/* --- SHARED SETTINGS --- */
const budgetDoc = doc(db,"settings","currentBudget");
const cycleDoc = doc(db,"settings","cycle");

/* Budget sync */
onSnapshot(budgetDoc, snap=>{
  if(snap.exists()){
    budgetValue = snap.data().amount;
    document.getElementById("budget").value = formatCurrency(budgetValue);
    render();
  } else {
    setDoc(budgetDoc,{amount:1200});
  }
});

/* Cycle sync */
onSnapshot(cycleDoc, snap=>{
  if(snap.exists()){
    cycleAnchor = new Date(snap.data().start);
    cycleAnchor.setHours(0,0,0,0);
    render();
  } else {
    // initialize default cycle
    const start = new Date(2026,2,19);
    setDoc(cycleDoc,{start:start.toISOString()});
  }
});

/* --- CYCLE LOGIC --- */
function getCycleStart(date=new Date()){
  const d = new Date(date);
  d.setHours(0,0,0,0);

  const diff = Math.floor((d-cycleAnchor)/(1000*60*60*24));
  const index = Math.floor(diff/14);

  const start = new Date(cycleAnchor);
  start.setDate(cycleAnchor.getDate() + index*14);
  return start;
}

function getCycleEnd(start){
  const end = new Date(start);
  end.setDate(start.getDate()+13);
  return end;
}

/* --- TRANSACTIONS --- */
async function addTransaction(){
  const desc = document.getElementById("desc").value.trim();
  const amt = parseFloat(document.getElementById("amount").value);
  if(!desc||!amt) return;

  await addDoc(collection(db,"transactions"),{
    desc, amt, date:new Date().toISOString()
  });

  desc.value="";
  amount.value="";
}

async function deleteTransaction(id){
  await deleteDoc(doc(db,"transactions",id));
}

async function editTransaction(id,desc,amt){
  const nd = prompt("Edit description:",desc);
  const na = parseFloat(prompt("Edit amount:",amt));
  if(!nd||!na) return;

  await updateDoc(doc(db,"transactions",id),{desc:nd,amt:na});
}

/* --- RENDER --- */
function render(){
  if(!cycleAnchor) return;

  const start = getCycleStart();
  const end = getCycleEnd(start);
  const now = new Date();

  const filtered = transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent = filtered.reduce((a,b)=>a+b.amt,0);
  const remaining = budgetValue - spent;

  document.getElementById("spent").innerText = formatCurrency(spent);
  document.getElementById("remaining").innerText = formatCurrency(remaining);

  const days = Math.min(Math.floor((now-start)/(1000*60*60*24))+1,14);
  const timePct = (days/14)*100;
  const spendPct = (spent/budgetValue)*100;

  document.getElementById("pace").innerText =
    `Used ${timePct.toFixed(0)}% of time, ${spendPct.toFixed(0)}% of budget`;

  const bar = document.getElementById("bar");
  bar.style.width = spendPct+"%";
  bar.className="bar";
  if(spendPct-timePct>15) bar.classList.add("red");
  else if(spendPct-timePct>5) bar.classList.add("yellow");

  document.getElementById("cycle").innerText =
    `Cycle: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  const list = document.getElementById("list");
  list.innerHTML="";

  filtered.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
      <div>
        <strong>${t.desc}</strong>
        <span class="subtle">${formatCurrency(t.amt)}</span>
      </div>
      <div class="actions">
        <button onclick="editTransaction('${t.id}','${t.desc}',${t.amt})">Edit</button>
        <button onclick="deleteTransaction('${t.id}')">Delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

/* --- LISTENER --- */
const q = query(collection(db,"transactions"),orderBy("date","asc"));
onSnapshot(q,snap=>{
  transactions = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

/* --- EVENTS --- */
window.editTransaction = editTransaction;
window.deleteTransaction = deleteTransaction;

document.getElementById("addBtn").onclick = addTransaction;
document.getElementById("updateBudgetBtn").onclick = async ()=>{
  const val = parseCurrency(document.getElementById("budget").value);
  await setDoc(budgetDoc,{amount:val});
};
document.getElementById("exportBtn").onclick = async ()=>{
  const docs = await getDocs(collection(db,"transactions"));
  const data = docs.docs.map(d=>d.data());
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
};

</script>
</body>
</html>
