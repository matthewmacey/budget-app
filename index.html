<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bi-Weekly Budget App</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system; background:#eef7ee; }

.header {
  background: linear-gradient(135deg,#16a34a,#22c55e);
  color:white; padding:25px; border-radius:0 0 25px 25px; text-align:center;
}

.container { padding:15px; margin-top:-20px; }

.card {
  background:white; border-radius:18px; padding:16px; margin-bottom:15px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.sticky {
  position:sticky;
  bottom:10px;
}

.stat { display:flex; align-items:center; gap:10px; }

#budget { width:90px; text-align:right; padding:6px; }
#updateBudgetBtn { width:auto; padding:6px 10px; font-size:12px; }

input, select {
  width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;
}

button {
  border:none; border-radius:10px; padding:6px 10px; margin-left:5px; cursor:pointer;
  background:#16a34a; color:white; font-weight:bold;
}

.quick-buttons button {
  background:#e5f9ec;
  color:#16a34a;
  margin-right:5px;
}

.row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; align-items:center; }
.row div.actions { display:flex; gap:5px; }

.subtle { font-size:12px; color:gray; }

.progress { height:12px; background:#e5e5ea; border-radius:10px; overflow:hidden; margin-top:10px; }
.bar { height:100%; width:0%; background:#34c759; transition:0.3s; }
.bar.yellow { background:#ffcc00; }
.bar.red { background:#ff3b30; }

.transaction-desc { font-weight:bold; }
.transaction-amt { color:#16a34a; margin-left:10px; font-weight:bold; }

/* Modal */
#editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
#editModal .modal-content { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
</style>
</head>

<body>

<div class="header"><h2>Bi-Weekly Budget</h2></div>

<div class="container">

<!-- Budget -->
<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>

  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>

  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="pace" class="subtle"></div>

  <div id="cycle" class="subtle"></div>
  <div id="insights" class="subtle"></div>
</div>

<!-- Chart -->
<div class="card"><canvas id="chart"></canvas></div>

<!-- Add Transaction -->
<div class="card sticky">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <div class="quick-buttons">
    <button onclick="quickAdd(5)">+$5</button>
    <button onclick="quickAdd(10)">+$10</button>
    <button onclick="quickAdd(20)">+$20</button>
    <button onclick="quickAdd(50)">+$50</button>
  </div>

  <select id="category">
    <option value="">AI Auto</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Kids</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Alcohol</option>
    <option>Other</option>
  </select>

  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<!-- Transactions -->
<div class="card" id="list"></div>

<!-- Edit Modal -->
<div id="editModal">
  <div class="modal-content">
    <h3>Edit Transaction</h3>
    <input id="editDesc">
    <input id="editAmount" type="number">
    <select id="editCategory">
      <option>Food</option><option>Travel</option><option>Shopping</option>
      <option>Kids</option><option>Bills</option><option>Entertainment</option>
      <option>Alcohol</option><option>Other</option>
    </select>
    <div style="display:flex; justify-content:space-between;">
      <button id="saveEditBtn">Save</button>
      <button id="cancelEditBtn">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain: "biweekly-budget-a5dac.firebaseapp.com",
  projectId: "biweekly-budget-a5dac",
  storageBucket: "biweekly-budget-a5dac.firebasestorage.app",
  messagingSenderId: "832349348274",
  appId: "1:832349348274:web:293ca1023fb060b20b04ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let transactions=[];
let chart;
let editId=null;

const spentEl=document.getElementById("spent");
const remainingEl=document.getElementById("remaining");
const budgetInput=document.getElementById("budget");
const desc=document.getElementById("desc");
const amount=document.getElementById("amount");
const category=document.getElementById("category");
const list=document.getElementById("list");
const cycleEl=document.getElementById("cycle");
const insightsEl=document.getElementById("insights");
const chartEl=document.getElementById("chart");
const paceEl=document.getElementById("pace");

const budgetDoc=doc(db,"settings","currentBudget");
const cycleDoc=doc(db,"settings","cycle");
let cycleAnchor=null;

// AI categorize
function categorizeAI(d){
  d=d.toLowerCase();
  if(/food|coffee|pizza/.test(d)) return "Food";
  if(/uber|gas/.test(d)) return "Travel";
  if(/amazon|target/.test(d)) return "Shopping";
  if(/beer|wine|vodka/.test(d)) return "Alcohol";
  return "Other";
}

// Load budget
onSnapshot(budgetDoc,s=>{
  if(s.exists()) budgetInput.value="$"+s.data().amount.toLocaleString();
});

// Load cycle
onSnapshot(cycleDoc,s=>{
  if(s.exists()) cycleAnchor=new Date(s.data().start);
});

// Load transactions
function startRealtime(){
  const q=query(collection(db,"transactions"), orderBy("date","asc"));
  onSnapshot(q,snap=>{
    transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// Render
function render(){
  if(!cycleAnchor) return;

  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.floor((now-cycleAnchor)/86400000);
  const cycleIndex=Math.floor(diff/14);

  const start=new Date(cycleAnchor); start.setDate(cycleAnchor.getDate()+cycleIndex*14);
  const end=new Date(start); end.setDate(start.getDate()+13);

  cycleEl.innerText=`Cycle: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  const budget=parseFloat(budgetInput.value.replace(/[^0-9.-]+/g,""))||1200;

  const filtered=transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent=filtered.reduce((a,b)=>a+b.amt,0);

  spentEl.innerText="$"+spent.toLocaleString();
  remainingEl.innerText="$"+(budget-spent).toLocaleString();

  const timePct=((now-start)/86400000)/14*100;
  const spendPct=(spent/budget)*100;

  paceEl.innerText=`${timePct.toFixed(0)}% of time elapsed • ${spendPct.toFixed(0)}% of budget used`;

  const bar=document.getElementById("bar");
  bar.style.width=Math.min(spendPct,100)+"%";

  // List
  list.innerHTML="";
  if(filtered.length===0){
    list.innerHTML="<div class='subtle'>No transactions yet</div>";
  }

  filtered.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>
        <span class="transaction-desc">${t.desc}</span>
        <span class="transaction-amt">$${t.amt.toLocaleString()}</span>
        <div class="subtle">${t.category}</div>
      </div>
      <div class="actions">
        <button onclick="openEdit('${t.id}','${t.desc}',${t.amt},'${t.category}')">Edit</button>
        <button onclick="deleteTransaction('${t.id}')">Delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

// Add
window.quickAdd = (val)=>{
  amount.value = val;
};

async function addTransaction(){
  if(!desc.value || !amount.value) return;
  await addDoc(collection(db,"transactions"),{
    desc:desc.value,
    amt:parseFloat(amount.value),
    category:category.value || categorizeAI(desc.value),
    date:new Date().toISOString()
  });
  desc.value=""; amount.value=""; category.value="";
}

// Edit
window.openEdit=(id,d,a,c)=>{
  editId=id;
  editDesc.value=d;
  editAmount.value=a;
  editCategory.value=c;
  editModal.style.display="flex";
};

saveEditBtn.onclick=async()=>{
  await updateDoc(doc(db,"transactions",editId),{
    desc:editDesc.value,
    amt:parseFloat(editAmount.value),
    category:editCategory.value
  });
  editModal.style.display="none";
};

cancelEditBtn.onclick=()=>editModal.style.display="none";

// Delete
window.deleteTransaction=async id=>{
  await deleteDoc(doc(db,"transactions",id));
};

// Export
async function exportToExcel(){
  const snap=await getDocs(collection(db,"transactions"));
  const data=snap.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

// Budget update
updateBudgetBtn.onclick=async()=>{
  const val=parseFloat(budgetInput.value.replace(/[^0-9.-]+/g,""));
  await setDoc(budgetDoc,{amount:val});
};

// Init
startRealtime();

addBtn.onclick=addTransaction;
exportBtn.onclick=exportToExcel;

</script>
</body>
</html>
