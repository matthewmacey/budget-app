<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bi-Weekly Budget</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Budget">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: -apple-system;
  margin: 0;
  background: #f2f2f7;
}

.container { padding: 20px; }

.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

h1 { text-align: center; }

.stat {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.subtle {
  font-size: 13px;
  color: gray;
}

.progress {
  height: 10px;
  background: #e5e5ea;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #34c759;
  transition: 0.3s;
}

.red { background: #ff3b30; }
.yellow { background: #ffcc00; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  margin-left: 5px;
}

#addBtn, #updateBudgetBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  font-size: 16px;
  margin-top: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.row div { display: flex; align-items: center; }
</style>
</head>

<body>

<div class="container">

<h1>Bi-Weekly Budget</h1>

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <input id="budget" value="$1,200">
  </div>
  <button id="updateBudgetBtn">Update Budget</button>

  <div class="stat"><span>Spent</span><span id="spent">$0</span></div>
  <div class="stat"><span>Remaining</span><span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>
  <div id="pace" class="subtle"></div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
</div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">
  <button id="addBtn">Add Purchase</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain: "biweekly-budget-a5dac.firebaseapp.com",
  projectId: "biweekly-budget-a5dac",
  storageBucket: "biweekly-budget-a5dac.firebasestorage.app",
  messagingSenderId: "832349348274",
  appId: "1:832349348274:web:293ca1023fb060b20b04ab",
  measurementId: "G-4KDSBKEQ51"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

let transactions = [];
let budgetValue = 1200;
const anchor = new Date("2026-03-19");

// Utilities
function formatCurrency(num) { return "$" + num.toLocaleString(); }
function parseCurrency(str) { return parseFloat(str.replace(/[^0-9.-]+/g,"")) || 0; }
function getCycleStart() {
  const now = new Date();
  const diffDays = Math.floor((now - anchor) / (1000*60*60*24));
  const cycleNumber = Math.floor(diffDays / 14);
  const start = new Date(anchor);
  start.setDate(anchor.getDate() + cycleNumber * 14);
  return start;
}

// Budget update
function updateBudget() {
  const input = document.getElementById("budget");
  budgetValue = parseCurrency(input.value);
  input.value = formatCurrency(budgetValue);
  render();
}
document.getElementById("updateBudgetBtn").addEventListener("click", updateBudget);
document.getElementById("budget").addEventListener("blur", updateBudget);
document.getElementById("budget").value = formatCurrency(budgetValue);

// Add transaction
async function addTransaction() {
  const desc = document.getElementById("desc").value;
  const amt = parseFloat(document.getElementById("amount").value);
  if (!desc || !amt) return;

  await addDoc(collection(db,"transactions"),{
    desc,
    amt,
    date: new Date().toISOString()
  });

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

// Delete transaction
async function deleteTransaction(id) {
  await deleteDoc(doc(db, "transactions", id));
}

// Edit transaction
async function editTransaction(id, oldDesc, oldAmt) {
  const newDesc = prompt("Edit description:", oldDesc);
  if (newDesc === null) return;
  const newAmt = prompt("Edit amount:", oldAmt);
  if (newAmt === null) return;
  await updateDoc(doc(db,"transactions",id), {
    desc: newDesc,
    amt: parseFloat(newAmt)
  });
}

// Render function
function render() {
  const start = getCycleStart();
  const end = new Date(start); end.setDate(start.getDate() + 13);
  const now = new Date();

  const filtered = transactions.filter(t=>{
    const d = new Date(t.date);
    return d >= start && d <= end;
  });

  const spent = filtered.reduce((a,b)=>a+b.amt,0);
  const remaining = budgetValue - spent;

  document.getElementById("spent").innerText = formatCurrency(spent);
  document.getElementById("remaining").innerText = formatCurrency(remaining);

  const totalDays = 14;
  let daysElapsed = Math.floor((now - start)/(1000*60*60*24))+1;
  daysElapsed = Math.min(Math.max(daysElapsed,1),14);

  const timePct = (daysElapsed/totalDays)*100;
  const spendPct = (spent/budgetValue)*100;

  document.getElementById("pace").innerText = `Used ${timePct.toFixed(0)}% of time, ${spendPct.toFixed(0)}% of budget`;

  const bar = document.getElementById("bar");
  const paceDiff = spendPct - timePct;
  bar.style.width = spendPct + "%";
  bar.className = "bar";
  if(paceDiff>15) bar.classList.add("red");
  else if(paceDiff>5) bar.classList.add("yellow");

  document.getElementById("cycle").innerText = `Cycle: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  // List transactions
  const list = document.getElementById("list");
  list.innerHTML = "";
  filtered.reverse().forEach(t=>{
    const row = document.createElement("div");
    row.className = "row";
    const inner = document.createElement("div");
    inner.innerHTML = `<span>${t.desc}</span><span>${formatCurrency(t.amt)}</span>`;
    const actions = document.createElement("div");

    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.onclick = ()=>editTransaction(t.id, t.desc, t.amt);

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = ()=>deleteTransaction(t.id);

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    row.appendChild(inner);
    row.appendChild(actions);
    list.appendChild(row);
  });
}

// Firestore real-time listener
onSnapshot(collection(db,"transactions"), snapshot=>{
  transactions = snapshot.docs.map(doc=>{
    const data = doc.data();
    data.id = doc.id; // keep id for edit/delete
    return data;
  });
  render();
});

// Attach add button
document.getElementById("addBtn").addEventListener("click", addTransaction);

</script>
</body>
</html>
