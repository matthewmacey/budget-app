<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget App</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system;background:#eef7ee}

.header{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:#fff;padding:25px;text-align:center;border-radius:0 0 25px 25px
}

.container{padding:15px;margin-top:-20px}

.card{
  background:#fff;border-radius:18px;padding:16px;margin-bottom:15px;
  box-shadow:0 6px 18px rgba(0,0,0,.05)
}

.sticky{position:sticky;bottom:10px}

.stat{display:flex;align-items:center;gap:8px}
#budget{width:90px;text-align:right}

input,select{
  width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px
}

button{
  border:none;border-radius:10px;padding:6px 10px;cursor:pointer;
  background:#16a34a;color:#fff;font-weight:bold
}

.quick button{
  background:#e5f9ec;color:#16a34a;margin-right:5px
}

.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid #eee
}

.actions{display:flex;gap:5px}

.subtle{font-size:12px;color:gray}

.progress{height:12px;background:#e5e5ea;border-radius:10px;overflow:hidden;margin-top:10px}
.bar{height:100%;background:#34c759;width:0%}
.bar.yellow{background:#ffcc00}
.bar.red{background:#ff3b30}

.amt{color:#16a34a;font-weight:bold;margin-left:8px}
</style>
</head>

<body>

<div class="header"><h2>Bi-Weekly Budget</h2></div>

<div class="container">

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>

  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>

  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="pace" class="subtle"></div>

  <div id="cycle" class="subtle"></div>
  <div id="insight" class="subtle"></div>
</div>

<div class="card"><canvas id="chart"></canvas></div>

<div class="card sticky">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <div class="quick">
    <button onclick="quick(5)">+$5</button>
    <button onclick="quick(10)">+$10</button>
    <button onclick="quick(20)">+$20</button>
    <button onclick="quick(50)">+$50</button>
  </div>

  <select id="category">
    <option value="">AI Auto</option>
    <option>Food</option><option>Travel</option><option>Shopping</option>
    <option>Kids</option><option>Bills</option><option>Entertainment</option>
    <option>Alcohol</option><option>Other</option>
  </select>

  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, updateDoc,
  deleteDoc, onSnapshot, query, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
  authDomain:"biweekly-budget-a5dac.firebaseapp.com",
  projectId:"biweekly-budget-a5dac"
});
const db = getFirestore(app);

let transactions=[], chart, cycleAnchor=null;

const budgetDoc=doc(db,"settings","budget");
const cycleDoc=doc(db,"settings","cycle");

// AI categorization
function catAI(d){
  d=d.toLowerCase();
  if(/restaurant|coffee|pizza|chipotle/.test(d)) return "Food";
  if(/uber|gas|flight/.test(d)) return "Travel";
  if(/amazon|target|walmart/.test(d)) return "Shopping";
  if(/beer|wine|vodka|whiskey/.test(d)) return "Alcohol";
  if(/netflix|movie|concert/.test(d)) return "Entertainment";
  return "Other";
}

// Budget sync
onSnapshot(budgetDoc,s=>{
  if(s.exists()) document.getElementById("budget").value="$"+s.data().amount.toLocaleString();
  else setDoc(budgetDoc,{amount:1200});
});

// Cycle sync
onSnapshot(cycleDoc,s=>{
  if(s.exists()) cycleAnchor=new Date(s.data().start);
  else setDoc(cycleDoc,{start:new Date(2026,2,19).toISOString()});
});

// Transactions realtime
onSnapshot(query(collection(db,"transactions"),orderBy("date","asc")),snap=>{
  transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
  checkCycle();
  render();
});

// Cycle reset
async function checkCycle(){
  if(!cycleAnchor) return;
  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.floor((now-cycleAnchor)/86400000);

  if(diff>=14){
    const start=new Date(cycleAnchor);
    const end=new Date(start); end.setDate(start.getDate()+13);

    for(const t of transactions){
      const d=new Date(t.date);
      if(d>=start && d<=end){
        await addDoc(collection(db,"history"),{...t,cycleStart:start,cycleEnd:end});
        await deleteDoc(doc(db,"transactions",t.id));
      }
    }

    const newStart=new Date(cycleAnchor);
    newStart.setDate(newStart.getDate()+14);
    await setDoc(cycleDoc,{start:newStart.toISOString()});
  }
}

// Render
function render(){
  if(!cycleAnchor) return;

  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.floor((now-cycleAnchor)/86400000);
  const idx=Math.floor(diff/14);

  const start=new Date(cycleAnchor); start.setDate(cycleAnchor.getDate()+idx*14);
  const end=new Date(start); end.setDate(start.getDate()+13);

  document.getElementById("cycle").innerText=
    `Cycle: ${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  const budget=parseFloat(document.getElementById("budget").value.replace(/[^0-9]/g,""))||1200;

  const filtered=transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent=filtered.reduce((a,b)=>a+b.amt,0);

  document.getElementById("spent").innerText="$"+spent.toLocaleString();
  document.getElementById("remaining").innerText="$"+(budget-spent).toLocaleString();

  const timePct=((now-start)/86400000)/14*100;
  const spendPct=(spent/budget)*100;

  document.getElementById("pace").innerText=
    `${timePct.toFixed(0)}% of time elapsed • ${spendPct.toFixed(0)}% of budget used`;

  const bar=document.getElementById("bar");
  bar.style.width=Math.min(spendPct,100)+"%";
  bar.className="bar";
  if(spendPct>timePct+15) bar.classList.add("red");
  else if(spendPct>timePct+5) bar.classList.add("yellow");

  // Chart
  const totals={};
  filtered.forEach(t=>{
    const c=t.category||catAI(t.desc);
    totals[c]=(totals[c]||0)+t.amt;
  });

  if(chart) chart.destroy();
  if(Object.keys(totals).length){
    chart=new Chart(document.getElementById("chart"),{
      type:"pie",
      data:{labels:Object.keys(totals),datasets:[{data:Object.values(totals)}]}
    });
  }

  const top=Object.entries(totals).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("insight").innerText=
    top?`Top spend: ${top[0]}`:"";

  // List
  const list=document.getElementById("list");
  list.innerHTML="";

  if(!filtered.length){
    list.innerHTML="<div class='subtle'>No transactions yet</div>";
    return;
  }

  filtered.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>${t.desc}<span class="amt">$${t.amt}</span></div>
      <div class="actions">
        <button onclick="edit('${t.id}')">Edit</button>
        <button onclick="del('${t.id}')">Delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

// Add
window.quick=v=>document.getElementById("amount").value=v;

document.getElementById("addBtn").onclick=async()=>{
  const d=document.getElementById("desc").value;
  const a=parseFloat(document.getElementById("amount").value);
  const c=document.getElementById("category").value||catAI(d);

  await addDoc(collection(db,"transactions"),{
    desc:d,amt:a,category:c,date:new Date().toISOString()
  });

  desc.value=""; amount.value="";
};

// Delete
window.del=id=>deleteDoc(doc(db,"transactions",id));

// Export
document.getElementById("exportBtn").onclick=async()=>{
  const snap=await getDocs(collection(db,"transactions"));
  const data=snap.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
};

// Budget update
document.getElementById("updateBudgetBtn").onclick=async()=>{
  const val=parseFloat(document.getElementById("budget").value.replace(/[^0-9]/g,""));
  await setDoc(budgetDoc,{amount:val});
};

</script>
</body>
</html>
