<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system;
  background: #eef2f7;
}

.header {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
  padding: 25px;
  border-radius: 0 0 25px 25px;
}

.container { padding: 15px; margin-top: -20px; }

.card {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.stat { display:flex; align-items:center; gap:10px; }

#budget { width:90px; text-align:right; padding:6px; }

#updateBudgetBtn {
  width:auto;
  padding:6px 10px;
  font-size:12px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#16a34a;
  color:white;
  font-weight:bold;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.subtle { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="header"><h2>Bi-Weekly Budget</h2></div>

<div class="container">

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>

  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>
  <div id="insights" class="subtle"></div>
</div>

<div class="card"><canvas id="chart"></canvas></div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">

  <select id="category">
    <option value="">Auto</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Kids</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Other</option>
  </select>

  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIza...", projectId:"biweekly-budget-a5dac" });
const db = getFirestore(app);

let transactions=[];
let migrated=false;
let chart;

/* CATEGORY */
function categorize(desc){
  const d=desc.toLowerCase();
  if(/food|restaurant|coffee|pizza/.test(d)) return "Food";
  if(/gas|uber|flight/.test(d)) return "Travel";
  if(/amazon|target/.test(d)) return "Shopping";
  return "Other";
}

/* ADD */
async function addTransaction(){
  const descVal=desc.value.trim();
  const amt=parseFloat(amount.value);
  if(!descVal||!amt) return;

  let cat=category.value || categorize(descVal);

  await addDoc(collection(db,"transactions"),{
    desc:descVal,
    amt,
    category:cat,
    date:new Date().toISOString()
  });

  desc.value=""; amount.value=""; category.value="";
}

/* SAFE LOAD + MIGRATION */
async function loadTransactions(){
  const snap=await getDocs(collection(db,"transactions"));

  let needsMigration=false;

  transactions = snap.docs.map(d=>{
    const data=d.data();

    if(!data.date || !data.category){
      needsMigration=true;
    }

    return { id:d.id, ...data };
  });

  if(needsMigration && !migrated){
    migrated=true;

    for(const t of transactions){
      const updates={};

      if(!t.date) updates.date=new Date().toISOString();
      if(!t.category) updates.category=categorize(t.desc||"");

      if(Object.keys(updates).length){
        await updateDoc(doc(db,"transactions",t.id),updates);
      }
    }

    console.log("Migration complete");
  }

  startRealtime();
}

/* REALTIME WITH SAFE SORT */
function startRealtime(){
  const q=query(collection(db,"transactions"), orderBy("date","asc"));

  onSnapshot(q,snap=>{
    transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

/* RENDER */
function render(){
  const spent=transactions.reduce((a,b)=>a+b.amt,0);
  spentEl.innerText="$"+spent;
  remaining.innerText="$"+(1200-spent);

  const totals={};
  transactions.forEach(t=>{
    totals[t.category]=(totals[t.category]||0)+t.amt;
  });

  if(chart) chart.destroy();
  chart=new Chart(chartEl,{
    type:"pie",
    data:{labels:Object.keys(totals),datasets:[{data:Object.values(totals)}]}
  });

  list.innerHTML="";
  transactions.slice().reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>
        <strong>${t.desc}</strong>
        <div class="subtle">${t.category}</div>
      </div>
      <div>$${t.amt}</div>
    `;
    list.appendChild(row);
  });
}

/* EXPORT */
async function exportToExcel(){
  const snap=await getDocs(collection(db,"transactions"));
  const data=snap.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

/* INIT */
loadTransactions();

addBtn.onclick=addTransaction;
exportBtn.onclick=exportToExcel;

</script>
</body>
</html>
