<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget App Debug</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #eef7ee; }
    .wrap { max-width: 700px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,.06); }
    .row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; }
    .subtle { color: #666; font-size: 12px; }
    button { padding: 8px 10px; border: none; border-radius: 8px; background: #16a34a; color: #fff; font-weight: 700; cursor: pointer; margin-right: 6px; }
    #debug { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #111; color: #0f0; padding: 10px; border-radius: 8px; min-height: 100px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 8px;">Ledger Debug</h2>
      <button id="seedBtn">Seed test transaction</button>
      <button id="loadOnceBtn">Load once</button>
      <div class="subtle">If this shows permission errors, fix Firestore Rules first.</div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Debug output</h3>
      <div id="debug"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Ledger</h3>
      <div id="list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const debugEl = document.getElementById("debug");
    const listEl = document.getElementById("list");
    const seedBtn = document.getElementById("seedBtn");
    const loadOnceBtn = document.getElementById("loadOnceBtn");

    function log(msg, obj) {
      const line = obj ? `${msg}\n${JSON.stringify(obj, null, 2)}` : msg;
      debugEl.textContent += `[${new Date().toLocaleTimeString()}] ${line}\n`;
      debugEl.scrollTop = debugEl.scrollHeight;
    }

    function normalizeDate(v) {
      if (v && typeof v.toDate === "function") return v.toDate();
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }

    function render(items) {
      listEl.innerHTML = "";
      if (!items.length) {
        listEl.innerHTML = `<div class="subtle">No transactions returned.</div>`;
        return;
      }
      items.slice().reverse().forEach(t => {
        const d = normalizeDate(t.date);
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div>
            <div><strong>${t.desc || "(no desc)"}</strong> - $${Number(t.amt || 0).toFixed(2)}</div>
            <div class="subtle">${t.category || "Other"} • ${d ? d.toLocaleString() : "No/invalid date"}</div>
          </div>
          <div class="subtle">${t.id}</div>
        `;
        listEl.appendChild(row);
      });
    }

    // Firebase init
    const app = initializeApp({
      apiKey: "AIzaSyA1KSyrh5UY3omenJMK2IBCH-fTvVCeIc4",
      authDomain: "biweekly-budget-a5dac.firebaseapp.com",
      projectId: "biweekly-budget-a5dac"
    });
    const db = getFirestore(app);
    log("Firebase initialized.");

    // Realtime listener
    onSnapshot(
      query(collection(db, "transactions"), orderBy("date", "asc")),
      (snap) => {
        const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        log(`onSnapshot success. docs=${items.length}`);
        render(items);
      },
      (err) => {
        log(`onSnapshot error: ${err.code} - ${err.message}`);
      }
    );

    // Seed
    seedBtn.onclick = async () => {
      try {
        const ref = await addDoc(collection(db, "transactions"), {
          desc: "Debug Test",
          amt: 9.99,
          category: "Food",
          date: new Date().toISOString()
        });
        log("Seed write success.", { id: ref.id });
      } catch (e) {
        log(`Seed write error: ${e.code} - ${e.message}`);
      }
    };

    // Load once
    loadOnceBtn.onclick = async () => {
      try {
        const snap = await getDocs(collection(db, "transactions"));
        const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        log(`getDocs success. docs=${items.length}`);
        render(items);
      } catch (e) {
        log(`getDocs error: ${e.code} - ${e.message}`);
      }
    };
  </script>
</body>
</html>
