<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system;
  background: #eef2f7;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
  padding: 25px;
  border-radius: 0 0 25px 25px;
}

/* CONTAINER */
.container { padding: 15px; margin-top: -20px; }

/* CARD */
.card {
  background: white;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

/* BUDGET ROW FIX */
.stat {
  display: flex;
  align-items: center;
  gap: 10px;
}

#budget {
  width: 100px;
  text-align: right;
  padding: 6px;
}

#updateBudgetBtn {
  width: auto;
  padding: 8px 10px;
  font-size: 12px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: white;
  font-weight: bold;
}

/* CATEGORY GRID */
.category-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.category-card {
  background: #f9fafb;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
}

/* TRANSACTIONS */
.row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.subtle { color: gray; font-size: 12px; }
</style>
</head>

<body>

<div class="header">
  <h2>Bi-Weekly Budget</h2>
</div>

<div class="container">

<div class="card">
  <div class="stat">
    <span>Budget</span>
    <button id="updateBudgetBtn">Update</button>
    <input id="budget">
  </div>

  <div><strong>Spent:</strong> <span id="spent">$0</span></div>
  <div><strong>Remaining:</strong> <span id="remaining">$0</span></div>

  <div id="cycle" class="subtle"></div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
</div>

<!-- CATEGORY BREAKDOWN -->
<div class="card">
  <div class="category-grid" id="categories"></div>
</div>

<div class="card">
  <input id="desc" placeholder="What did you buy?">
  <input id="amount" type="number" placeholder="Amount">
  <button id="addBtn">Add Purchase</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIza...", projectId:"biweekly-budget-a5dac" });
const db = getFirestore(app);

let transactions = [];
let budgetValue = 1200;
let cycleAnchor = null;

/* CATEGORY LOGIC */
function categorize(desc){
  const d = desc.toLowerCase();
  if(d.match(/restaurant|coffee|food|pizza|chipotle|mcdonald/)) return "Food";
  if(d.match(/gas|uber|train|flight/)) return "Travel";
  if(d.match(/target|amazon|shop/)) return "Shopping";
  if(d.match(/kid|school|toy/)) return "Kids";
  if(d.match(/rent|mortgage|bill|electric/)) return "Bills";
  if(d.match(/movie|netflix|game/)) return "Entertainment";
  return "Other";
}

/* SHARED SETTINGS */
const budgetDoc = doc(db,"settings","currentBudget");
const cycleDoc = doc(db,"settings","cycle");

onSnapshot(budgetDoc,s=>{
  if(s.exists()){
    budgetValue=s.data().amount;
    document.getElementById("budget").value="$"+budgetValue;
    render();
  } else setDoc(budgetDoc,{amount:1200});
});

onSnapshot(cycleDoc,s=>{
  if(s.exists()){
    cycleAnchor=new Date(s.data().start);
    cycleAnchor.setHours(0,0,0,0);
    render();
  } else setDoc(cycleDoc,{start:new Date(2026,2,19).toISOString()});
});

/* CYCLE */
function getStart(){
  const d=new Date(); d.setHours(0,0,0,0);
  const diff=Math.floor((d-cycleAnchor)/86400000);
  const idx=Math.floor(diff/14);
  const s=new Date(cycleAnchor);
  s.setDate(cycleAnchor.getDate()+idx*14);
  return s;
}
function getEnd(s){ const e=new Date(s); e.setDate(s.getDate()+13); return e; }

/* ADD */
async function addTransaction(){
  const desc=descEl.value.trim();
  const amt=parseFloat(amountEl.value);
  if(!desc||!amt) return;

  const category = categorize(desc);

  await addDoc(collection(db,"transactions"),{
    desc, amt, category,
    date:new Date().toISOString()
  });

  descEl.value=""; amountEl.value="";
}

/* RENDER */
function render(){
  if(!cycleAnchor) return;

  const start=getStart();
  const end=getEnd(start);

  const filtered=transactions.filter(t=>{
    const d=new Date(t.date);
    return d>=start && d<=end;
  });

  const spent=filtered.reduce((a,b)=>a+b.amt,0);
  document.getElementById("spent").innerText="$"+spent;
  document.getElementById("remaining").innerText="$"+(budgetValue-spent);

  document.getElementById("cycle").innerText=
    `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;

  /* CATEGORY TOTALS */
  const totals={};
  filtered.forEach(t=>{
    totals[t.category]=(totals[t.category]||0)+t.amt;
  });

  const catDiv=document.getElementById("categories");
  catDiv.innerHTML="";
  Object.keys(totals).forEach(c=>{
    const el=document.createElement("div");
    el.className="category-card";
    el.innerHTML=`<strong>${c}</strong><br>$${totals[c]}`;
    catDiv.appendChild(el);
  });

  /* LIST */
  const list=document.getElementById("list");
  list.innerHTML="";
  filtered.reverse().forEach(t=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div>
        <strong>${t.desc}</strong>
        <div class="subtle">${t.category}</div>
      </div>
      <div>$${t.amt}</div>
    `;
    list.appendChild(row);
  });
}

/* EXPORT */
async function exportToExcel(){
  const docs=await getDocs(collection(db,"transactions"));
  const data=docs.docs.map(d=>d.data());
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Budget");
  XLSX.writeFile(wb,"budget.xlsx");
}

/* LISTENER */
const q=query(collection(db,"transactions"),orderBy("date","asc"));
onSnapshot(q,s=>{
  transactions=s.docs.map(d=>d.data());
  render();
});

/* EVENTS */
const descEl=document.getElementById("desc");
const amountEl=document.getElementById("amount");

document.getElementById("addBtn").onclick=addTransaction;
document.getElementById("exportBtn").onclick=exportToExcel;
document.getElementById("updateBudgetBtn").onclick=async()=>{
  const val=parseFloat(document.getElementById("budget").value.replace(/[^0-9]/g,""));
  await setDoc(budgetDoc,{amount:val});
};
</script>
</body>
</html>
